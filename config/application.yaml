application:

  # 规则源配置 - 三个 Clash 规则源
  input:
    - name: 'adblockmihomo'
      path: 'https://gcore.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockmihomo.yaml'
      type: clash

    - name: 'DD-AD'
      path: 'https://ghproxy.net/https://raw.githubusercontent.com/afwfv/DD-AD/refs/heads/release/clash.yaml'
      type: clash

    - name: 'AWAvenue-Ads-Rule'
      path: 'https://github.boki.moe/https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash-Classical.yaml'
      type: clash

  # 输出配置
  output:
    # 文件头配置，将自动作为注释添加至每个规则文件开始
    file_header: |
      ADFS AdBlock ${type}
      Last Modified: ${date}
      Total Size: ${total}
      Homepage: https://github.com/fordes123/ad-filters-subscriber/
      
    files:
      # 输出为 Clash 格式
      - name: clash.yaml
        type: clash
        desc: 'Merged Clash AdBlock Rules'
        filter:
          - basic      # 基本规则
          - wildcard   # 通配规则
          - unknown    # 其他规则

      # 同时输出其他格式（可选）
      - name: easylist.txt
        type: easylist
        desc: 'Merged EasyList Rules'
        filter:
          - basic
          - wildcard

      - name: dns.txt
        type: dns
        desc: 'Merged DNS Rules'
        filter:
          - basic
          - wildcard

      - name: hosts.txt
        type: hosts
        desc: 'Merged Hosts Rules'
        filter:
          - basic
